<!DOCTYPE html>
<html lang="en">
<head>

    <title>Décadi</title>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --cream: #F5F0E8;
            --gold: #C9A96E;
            --gold-light: #D4BA85;
            --dark: #1a1a1a;
            --muted: #8E8A84;

            --season-autumn: linear-gradient(160deg, #4A2511 0%, #8B4513 30%, #A0522D 60%, #6B3410 100%);
            --season-winter: linear-gradient(160deg, #1B2838 0%, #2C3E50 30%, #34495E 60%, #1a2530 100%);
            --season-spring: linear-gradient(160deg, #1a3a1a 0%, #2D572C 30%, #3B6B3A 60%, #1e4a1e 100%);
            --season-summer: linear-gradient(160deg, #4A3600 0%, #7A5C00 30%, #8B6914 60%, #5A4200 100%);
        }

        html, body {
            height: 100%;
            overflow: hidden;
            background: var(--dark);
            color: var(--cream);
        }

        body {
            font-family: 'Crimson Text', Georgia, serif;
        }

        #app {
            position: relative;
            width: 100%;
            height: 100%;
        }

        #background {
            position: absolute;
            inset: 0;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            transition: opacity 1.5s ease;
            opacity: 0;
            will-change: opacity;
        }

        #background.loaded {
            opacity: 1;
        }

        #seasonal-bg {
            position: absolute;
            inset: 0;
            will-change: opacity;
        }

        #seasonal-bg[data-season="autumn"] { background: var(--season-autumn); }
        #seasonal-bg[data-season="winter"] { background: var(--season-winter); }
        #seasonal-bg[data-season="spring"] { background: var(--season-spring); }
        #seasonal-bg[data-season="summer"] { background: var(--season-summer); }

        #overlay {
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at center, rgba(0,0,0,0.62) 0%, rgba(0,0,0,0.85) 100%);
            z-index: 1;
        }

        .loading-spinner {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 30px;
            height: 30px;
            border: 2px solid rgba(201,169,110,0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            z-index: 2;
        }

        @keyframes spin {
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        main {
            position: absolute;
            inset: 0;
            z-index: 3;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .sr-only {
            position: absolute;
            width: 1px;
            height: 1px;
            padding: 0;
            margin: -1px;
            overflow: hidden;
            clip: rect(0, 0, 0, 0);
            white-space: nowrap;
            border: 0;
        }

        #content {
            margin: auto;
            text-align: left;
            padding: 2rem 3rem;
            max-width: 700px;
            width: 100%;
            opacity: 0;
            transform: translateY(10px);
            animation: fadeUp 1.2s ease 0.3s forwards;
        }

        @keyframes fadeUp {
            to { opacity: 1; transform: translateY(0); }
        }

        .header-label {
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            color: var(--gold-light);
            margin-bottom: 2.5rem;
            opacity: 0.85;
        }

        /* Two-column date header: month left, day number right */
        .date-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 2rem;
            margin-bottom: 2rem;
        }

        .date-header-left {
            min-width: 0;
        }

        .date-header-right {
            text-align: right;
            flex-shrink: 0;
        }

        .month-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(2.5rem, 6vw, 4.5rem);
            font-weight: 600;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            line-height: 1.1;
            margin-bottom: 0.3rem;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        .month-meaning {
            font-family: 'Crimson Text', serif;
            font-style: italic;
            font-size: 1.15rem;
            color: var(--gold-light);
            opacity: 0.9;
        }

        .day-number {
            font-family: 'Playfair Display', serif;
            font-size: clamp(4rem, 10vw, 7rem);
            font-weight: 700;
            line-height: 1;
            margin-bottom: 0.2rem;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        .decade-day {
            font-family: 'Crimson Text', serif;
            font-size: 1rem;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--gold-light);
            opacity: 0.85;
        }

        .divider {
            width: 60px;
            height: 1px;
            background: var(--gold);
            margin-bottom: 1.2rem;
            opacity: 0.6;
        }

        .rural-name {
            font-family: 'Playfair Display', serif;
            font-size: clamp(1.5rem, 4vw, 2.2rem);
            font-weight: 600;
            font-style: italic;
            margin-bottom: 0.3rem;
            text-shadow: 0 1px 4px rgba(0,0,0,0.4);
        }

        .rural-english {
            font-family: 'Crimson Text', serif;
            font-size: 1.05rem;
            color: var(--gold-light);
            margin-bottom: 0.35rem;
            opacity: 0.9;
        }

        .day-type {
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .year-line {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            letter-spacing: 0.12em;
            margin-bottom: 0.4rem;
            opacity: 0.8;
        }

        .gregorian {
            font-family: 'Crimson Text', serif;
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 2rem;
        }

        .info-box {
            max-width: 420px;
            padding: 1rem 1.5rem;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(201,169,110,0.15);
            border-radius: 4px;
            font-family: 'Crimson Text', serif;
            font-size: 0.9rem;
            line-height: 1.6;
            color: var(--cream);
            opacity: 0.7;
        }

        /* Complementary day classes */
        .complementary-badge {
            display: inline-block;
            padding: 0.3rem 1rem;
            border: 1px solid var(--gold);
            border-radius: 2px;
            font-family: 'Crimson Text', serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.5rem;
        }

        .complementary-title {
            font-size: clamp(1.8rem, 5vw, 3rem);
            margin-bottom: 0.5rem;
        }

        .complementary-note {
            margin-top: 1rem;
            margin-bottom: 2rem;
        }

        .comp-divider {
            margin-top: 2rem;
        }

        @media (max-height: 650px) {
            .month-meaning { margin-bottom: 0.5rem; }
            .day-number { font-size: clamp(3rem, 8vw, 5rem); }
            .info-box { font-size: 0.8rem; padding: 0.6rem 1rem; }
            #content { padding: 1rem 2rem; }
        }

        @media (max-width: 768px) {
            #content { padding: 1.5rem 2rem; }
        }

        @media (max-width: 480px) {
            #content { padding: 1.5rem 1rem; }
            .header-label { margin-bottom: 1.5rem; font-size: 0.75rem; }
            .date-header { flex-direction: column; gap: 0.5rem; }
            .date-header-right { text-align: left; }
            .day-type { margin-bottom: 1.5rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>

    ["Bigarade","Bitter orange","Bitter orange"],["Verge d'or","Goldenrod","Solidago"],
    ["Maïs","Maize"],["Marron","Chestnut"],["Panier","Basket","Wicker basket"]
  ]
];

const SANSCULOTTIDES = [
    ["Fête de la Vertu", "Day of Virtue", "Virtue"],
    ["Fête du Génie", "Day of Genius", "Genius"],
    ["Fête du Travail", "Day of Labour", "Labour"],
    ["Fête de l'Opinion", "Day of Opinion", "Opinion"],
    ["Fête des Récompenses", "Day of Rewards", "Reward"],
    ["Fête de la Révolution", "Day of the Revolution", "French Revolution"]
];

const DECADE_NAMES = [
    "Primidi", "Duodi", "Tridi", "Quartidi", "Quintidi",
    "Sextidi", "Septidi", "Octidi", "Nonidi", "Décadi"
];

const GREG_MONTHS = [
    "January","February","March","April","May","June",
    "July","August","September","October","November","December"
];


// ─── EQUINOX CALCULATION (Meeus) ────────────────────────────────────

function septemberEquinox(year) {
    const Y = (year - 2000) / 1000;
    const JDE = 2451810.21715
        + 365242.01767 * Y
        - 11.37220 * Y * Y
        + 0.00488 * Y * Y * Y
        + 0.00325 * Y * Y * Y * Y;
    return jdToGregorian(JDE);
}

function jdToGregorian(JD) {
    const z = Math.floor(JD + 0.5);
    const f = JD + 0.5 - z;
    let a;
    if (z < 2299161) {
        a = z;
    } else {
        const alpha = Math.floor((z - 1867216.25) / 36524.25);
        a = z + 1 + alpha - Math.floor(alpha / 4);
    }
    const b = a + 1524;
    const c = Math.floor((b - 122.1) / 365.25);
    const d = Math.floor(365.25 * c);
    const e = Math.floor((b - d) / 30.6001);
    const day = b - d - Math.floor(30.6001 * e);
    const month = e < 14 ? e - 1 : e - 13;
    const yr = month > 2 ? c - 4716 : c - 4715;
    return { year: yr, month, day };
}

function gregorianToJD(year, month, day) {
    if (month <= 2) { year--; month += 12; }
    const A = Math.floor(year / 100);
    const B = 2 - A + Math.floor(A / 4);
    return Math.floor(365.25 * (year + 4716))
         + Math.floor(30.6001 * (month + 1))
         + day + B - 1524.5;
}

function daysBetween(y1, m1, d1, y2, m2, d2) {
    return Math.round(gregorianToJD(y2, m2, d2) - gregorianToJD(y1, m1, d1));
}


// ─── GREGORIAN → REPUBLICAN CONVERSION ────────────────────────────

function toRepublican(gYear, gMonth, gDay) {
    const eqThis = septemberEquinox(gYear);
    const eqPrev = septemberEquinox(gYear - 1);

    let repYear, startEq;
    const dThis = daysBetween(eqThis.year, eqThis.month, eqThis.day, gYear, gMonth, gDay);
    if (dThis >= 0) {
        repYear = gYear - 1791;
        startEq = eqThis;
    } else {
        repYear = gYear - 1792;
        startEq = eqPrev;
    }

    const dayOfYear = daysBetween(startEq.year, startEq.month, startEq.day, gYear, gMonth, gDay);

    if (dayOfYear >= 360) {
        const compDay = dayOfYear - 360;
        return {
            year: repYear,
            month: -1,
            day: compDay + 1,
            dayOfYear,
            isComplementary: true
        };
    }

    const month = Math.floor(dayOfYear / 30);
    const day = (dayOfYear % 30) + 1;

    return { year: repYear, month, day, dayOfYear, isComplementary: false };
}


// ─── REPUBLICAN LEAP YEAR ───────────────────────────────────────────

function isRepublicanLeapYear(repYear) {
    // A Republican year spanning 366 Gregorian days has 6 Sansculottides
    const gYearStart = repYear + 1791;
    const eq1 = septemberEquinox(gYearStart);
    const eq2 = septemberEquinox(gYearStart + 1);
    return daysBetween(eq1.year, eq1.month, eq1.day, eq2.year, eq2.month, eq2.day) === 366;
}


// ─── ROMAN NUMERALS ────────────────────────────────────────────────

function toRoman(num) {
    const vals = [1000,900,500,400,100,90,50,40,10,9,5,4,1];
    const syms = ["M","CM","D","CD","C","XC","L","XL","X","IX","V","IV","I"];
    let result = "";
    for (let i = 0; i < vals.length; i++) {
        while (num >= vals[i]) {
            result += syms[i];
            num -= vals[i];
        }
    }
    return result;
}


// ─── IMAGE LOADING ─────────────────────────────────────────────────

async function loadImage(searchTerm) {
    const today = new Date().toISOString().slice(0, 10);
    const cacheKey = `frc_img_${today}`;

    // Return cached URL if available
    try {
        const cached = localStorage.getItem(cacheKey);
        if (cached) return cached;
    } catch (e) { /* storage unavailable */ }

    let url = null;

    // Try Wikimedia Commons first (better coverage for nature terms)
    try {
        const commonsUrl = `https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${encodeURIComponent(searchTerm)}&gsrnamespace=6&gsrlimit=3&prop=imageinfo&iiprop=url|mime&iiurlwidth=1920&format=json&origin=*`;
        const resp = await fetch(commonsUrl);
        if (resp.ok) {
            const data = await resp.json();
            if (data.query && data.query.pages) {
                const pages = Object.values(data.query.pages)
                    .sort((a, b) => (a.index || 0) - (b.index || 0));
                for (const page of pages) {
                    if (page.imageinfo && page.imageinfo[0]) {
                        const info = page.imageinfo[0];
                        if (info.mime && info.mime.startsWith('image/') && !info.mime.includes('svg')) {
                            url = info.thumburl || info.url;
                            break;
                        }
                    }
                }
            }
        }
    } catch (e) { /* fall through */ }

    // Fallback: Wikipedia page image
    if (!url) {
        try {
            const wikiUrl = `https://en.wikipedia.org/w/api.php?action=query&titles=${encodeURIComponent(searchTerm)}&prop=pageimages&piprop=original|thumbnail&pithumbsize=1920&format=json&origin=*`;
            const resp = await fetch(wikiUrl);
            if (resp.ok) {
                const data = await resp.json();
                const page = Object.values(data.query.pages)[0];
                if (page && page.original) url = page.original.source;
                else if (page && page.thumbnail) url = page.thumbnail.source;
            }
        } catch (e) { /* silently fail */ }
    }

    // Cache the result and clear stale entries
    if (url) {
        try {
            for (let i = localStorage.length - 1; i >= 0; i--) {
                const k = localStorage.key(i);
                if (k && k.startsWith('frc_img_') && k !== cacheKey) localStorage.removeItem(k);
            }
            localStorage.setItem(cacheKey, url);
        } catch (e) { /* storage full or unavailable */ }
    }

    return url;
}

function setBackgroundImage(url) {
    // Validate URL protocol before inserting into CSS
    try {
        const parsed = new URL(url);
        if (!['https:', 'http:'].includes(parsed.protocol)) return;
    } catch (e) { return; }

    const bg = document.getElementById('background');
    const img = new Image();
    img.crossOrigin = "anonymous";
    img.onload = () => {
        bg.style.backgroundImage = `url("${url.replace(/"/g, '%22')}")`;
        bg.classList.add('loaded');
        document.getElementById('spinner').style.display = 'none';
    };
    img.onerror = () => {
        document.getElementById('spinner').style.display = 'none';
    };
    img.src = url;
}

function setSeasonalGradient(season) {
    document.getElementById('seasonal-bg').dataset.season = season.toLowerCase();
}


// ─── DAY TYPE ──────────────────────────────────────────────────────

function getDayType(monthIndex, dayNum) {
    if (dayNum % 10 === 0) return "tool day";
    if (dayNum % 10 === 5) return "animal day";
    if (monthIndex === 3) return "mineral day"; // Nivôse
    return "plant day";
}


// ─── DOM HELPERS ───────────────────────────────────────────────────

function el(tag, className, text, lang) {
    const node = document.createElement(tag);
    if (className) node.className = className;
    if (text != null) node.textContent = text;
    if (lang) node.lang = lang;
    return node;
}


// ─── RENDER ────────────────────────────────────────────────────────

function render() {
    const now = new Date();
    const gYear = now.getFullYear();
    const gMonth = now.getMonth() + 1;
    const gDay = now.getDate();

    const rep = toRepublican(gYear, gMonth, gDay);
    const content = document.getElementById('content');
    content.textContent = '';

    content.appendChild(el('div', 'header-label', 'Le Calendrier Républicain', 'fr'));

    if (rep.isComplementary) {
        const comp = SANSCULOTTIDES[rep.day - 1];
        setSeasonalGradient('autumn');
        document.title = `${comp[0]} — Décadi`;

        content.appendChild(el('div', 'complementary-badge', 'Jour complémentaire', 'fr'));
        content.appendChild(el('div', 'rural-name complementary-title', comp[0], 'fr'));
        content.appendChild(el('div', 'rural-english', comp[1]));

        const total = isRepublicanLeapYear(rep.year) ? 6 : 5;
        content.appendChild(el('div', 'day-type complementary-note', `Sansculottide ${rep.day} of ${total}`));

        content.appendChild(el('div', 'divider comp-divider'));
        content.appendChild(el('div', 'year-line', `An ${toRoman(rep.year)} de la République`, 'fr'));
        content.appendChild(el('div', 'gregorian', `${gDay} ${GREG_MONTHS[gMonth-1]} ${gYear}`));

        const infoBox = el('div', 'info-box');
        // Static trusted string — safe to use innerHTML for the <em> tag
        infoBox.innerHTML = 'The five (or six) complementary days, the <em lang="fr">Sansculottides</em>, fall at the end of the Republican year. Each is a festival celebrating a civic virtue.';
        content.appendChild(infoBox);

        loadImage(comp[2]).then(url => { if (url) setBackgroundImage(url); });

    } else {
        const month = MONTHS[rep.month];
        const dayData = DAYS[rep.month][rep.day - 1];
        const decadeName = DECADE_NAMES[(rep.day - 1) % 10];
        const dayType = getDayType(rep.month, rep.day);
        const wikiTerm = dayData[2] || dayData[1];

        setSeasonalGradient(month.suffix);
        document.title = `${month.fr} ${rep.day} — Décadi`;

        // Two-column header: month/meaning left, day number/decade right
        const dateHeader = el('div', 'date-header');

        const left = el('div', 'date-header-left');
        left.appendChild(el('div', 'month-name', month.fr, 'fr'));
        left.appendChild(el('div', 'month-meaning', month.en));
        dateHeader.appendChild(left);

        const right = el('div', 'date-header-right');
        right.appendChild(el('div', 'day-number', String(rep.day)));
        right.appendChild(el('div', 'decade-day', decadeName, 'fr'));
        dateHeader.appendChild(right);

        content.appendChild(dateHeader);
        content.appendChild(el('div', 'divider'));
        content.appendChild(el('div', 'rural-name', dayData[0], 'fr'));
        content.appendChild(el('div', 'rural-english', dayData[1]));
        content.appendChild(el('div', 'day-type', dayType));
        content.appendChild(el('div', 'year-line', `An ${toRoman(rep.year)} de la République`, 'fr'));
        content.appendChild(el('div', 'gregorian', `${gDay} ${GREG_MONTHS[gMonth-1]} ${gYear}`));

        const dayTypeArticle = dayType === "animal day" ? "an animal"
            : dayType === "tool day" ? "an agricultural tool"
            : dayType === "mineral day" ? "a mineral"
            : "a plant";

        const infoBox = el('div', 'info-box');
        const nameEm = document.createElement('em');
        nameEm.textContent = dayData[1].toLowerCase();
        infoBox.textContent = `Each day in the Republican calendar is named for an element of rural life. Today is ${dayTypeArticle} day, named for `;
        infoBox.appendChild(nameEm);
        infoBox.appendChild(document.createTextNode('.'));
        content.appendChild(infoBox);

        loadImage(wikiTerm).then(url => { if (url) setBackgroundImage(url); });
    }
}


// ─── INITIALISE ────────────────────────────────────────────────────

render();

function msUntilMidnight() {
    const now = new Date();
    const midnight = new Date(now.getFullYear(), now.getMonth(), now.getDate() + 1);
    return midnight - now;
}

function scheduleNextMidnight() {
    setTimeout(() => {
        render();
        scheduleNextMidnight();
    }, msUntilMidnight());
}

scheduleNextMidnight();

</script>
